http:
  services:
    grafana:
      loadBalancer:
        servers:
          - url: http://100.76.122.97:3002

  routers:
    grafana-private:
      entryPoints:
        - https-ep
      rule: Host(`grafana.{{ env "DOMAIN_0" }}`)
