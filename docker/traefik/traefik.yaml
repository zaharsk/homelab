log:
  level: 'DEBUG'

ping: {}

api:
  dashboard: true
  debug: false
  insecure: false

providers:
  file:
    directory: "/etc/traefik/dynamic"

  docker:
    exposedByDefault: false

certificatesResolvers:
  cloudflare_lego:
    acme:
      email: zaharsk@gmail.com
      storage: /etc/traefik/certs/cloudflare.json
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

entryPoints:
  http-ep:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https-ep
          scheme: https
          permanent: true
    forwardedHeaders:
      trustedIPs: &trustedIPs
        # NetBird's Network IPs
        - 100.76.0.0/16
        - fd9d:7f26:187d:26a7::/64
        # Cloudflare: https://www.cloudflare.com/ips/
        - 103.21.244.0/22
        - 173.245.48.0/20
        - 103.22.200.0/22
        - 103.31.4.0/22
        - 141.101.64.0/18
        - 108.162.192.0/18
        - 190.93.240.0/20
        - 188.114.96.0/20
        - 197.234.240.0/22
        - 198.41.128.0/17
        - 162.158.0.0/15
        - 104.16.0.0/13
        - 104.24.0.0/14
        - 172.64.0.0/13
        - 131.0.72.0/22
        - 2400:cb00::/32
        - 2606:4700::/32
        - 2803:f800::/32
        - 2405:b500::/32
        - 2405:8100::/32
        - 2a06:98c0::/29
        - 2c0f:f248::/32
    
  https-ep:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare_lego
    transport:
      respondingTimeouts:
        readTimeout: 10m
        writeTimeout: 10m
        idleTimeout: 10m
    forwardedHeaders:
      trustedIPs: *trustedIPs

  ssh-forgejo-ep:
    address: ":2201"