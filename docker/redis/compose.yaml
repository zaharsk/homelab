name: redis
services:
  redis:
    image: redis

    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    ports:
      - '0.0.0.0:6379:6379'

    command:
      - redis-server
      - --appendonly
      - "yes"

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    security_opt:
      - no-new-privileges:true

  redisinsight:
    image: redis/redisinsight

    depends_on:
      redis:
        condition: service_healthy

    volumes:
      - redisinsight_data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    ports:
      - '0.0.0.0:5540:5540'

    restart: unless-stopped

    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:5540/api/health/ >/dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

volumes:
  redis_data:
  redisinsight_data:
