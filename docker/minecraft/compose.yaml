# Generated by setupmc.com on 2026-05-24T06:11:44.462Z
name: minecraft

services:
  minecraft:
    image: itzg/minecraft-server:latest

    volumes:
      - ./data:/data

    environment:
      EULA: "TRUE"
      MEMORY: "4096M"
      MAX_PLAYERS: "4"
      USE_AIKAR_FLAGS: "true"
      TZ: "Europe/Belgrade"
      DIFFICULTY: "2"
      LEVEL: "Random World"
      OPS: ${OPS}
      ENABLE_WHITELIST: "true"
      WHITELIST: ${WHITELIST}
      SERVER_NAME: "Unco Games"
      ENABLE_ROLLING_LOGS: "true"

    ports:
      - '25565:25565'

    healthcheck:
      test: mc-health
      start_period: 1m
      interval: 5s
      retries: 20

    # cap_drop:
    #   - ALL

    security_opt:
      - no-new-privileges:true

    stdin_open: true

    tty: true
