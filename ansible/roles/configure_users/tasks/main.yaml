---
- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Ensure managed users exist
  loop: "{{ configure_users_list }}"

  ansible.builtin.user:
    name: "{{ item.name }}"
    shell: /bin/bash
    create_home: true
    password_lock: true
    groups: "{{ item.groups | join(',') }}"
    append: true
    state: present

- name: Install authorized keys
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    key: "{{ item.public_keys | join('\n') }}"
    state: present
    exclusive: true
  loop: "{{ configure_users_list }}"
  when:
    - item.public_keys is defined
    - item.public_keys | length > 0

- name: Configure sudo users
  loop: "{{ configure_users_list }}"

  community.general.sudoers:
    name: "{{ item.name }}"
    state: present
    user: "{{ item.name }}"
    commands: ALL
    nopassword: "{{ item.sudo_nopasswd }}"
